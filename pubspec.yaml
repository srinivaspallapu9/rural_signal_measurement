name: rural_signal_measurement
description: A Flutter app for measuring mobile network signals in rural areas

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Dependencies
  connectivity_plus: ^5.0.2
  geolocator: ^10.1.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.1
  
  # UI Dependencies
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.9
  fl_chart: ^0.66.0
  
  # Utility
  intl: ^0.18.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - lib/assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/logo.png"
  min_sdk_android: 21